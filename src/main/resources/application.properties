# ── Application ────────────────────────────────────────────────
quarkus.application.name=checkout-service

# ── Datasource ─────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/checkout_db
quarkus.datasource.username=checkout
quarkus.datasource.password=checkout_secret
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.acquisition-timeout=5s

# ── Hibernate ORM ──────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.jdbc.statement-timeout=5
quarkus.hibernate-orm.log.sql=true

# ── Health ─────────────────────────────────────────────────────
quarkus.health.extensions.enabled=true

# ── Metrics ────────────────────────────────────────────────────
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# ── OpenAPI / Swagger ──────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Checkout Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Event-driven checkout microservice with transactional outbox pattern

# ── Logging ────────────────────────────────────────────────────
%prod.quarkus.log.console.json=true
quarkus.log.level=INFO
quarkus.log.category."dev.ammar".level=DEBUG
