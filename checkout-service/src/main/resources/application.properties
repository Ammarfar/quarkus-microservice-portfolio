quarkus.application.name=checkout-service
quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:checkout}
quarkus.datasource.password=${DB_PASSWORD:checkout}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/checkout_db}
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.acquisition-timeout=5S

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.datasource.jdbc.statement-timeout=5

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

mp.messaging.incoming.checkout-requested.connector=smallrye-kafka
mp.messaging.incoming.checkout-requested.topic=order.checkout.requested
mp.messaging.incoming.checkout-requested.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.checkout-requested.auto.offset.reset=earliest

mp.messaging.outgoing.checkout-completed.connector=smallrye-kafka
mp.messaging.outgoing.checkout-completed.topic=order.checkout.completed
mp.messaging.outgoing.checkout-completed.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.checkout-failed.connector=smallrye-kafka
mp.messaging.outgoing.checkout-failed.topic=order.checkout.failed
mp.messaging.outgoing.checkout-failed.value.serializer=org.apache.kafka.common.serialization.StringSerializer

quarkus.log.json.console.enabled=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.swagger-ui.always-include=true
